
<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>गुरु AI | अर्जुनको एउटा सपना</title>
    <style>
        body {
            background-color: #0d0d0d;
            color: #d4af37;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        header {
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #d4af37;
            background: #1a1a1a;
        }
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .message {
            margin-bottom: 15px;
            padding: 12px;
            border-radius: 8px;
            max-width: 85%;
        }
        .guru-msg {
            background-color: #1a1a1a;
            border-left: 4px solid #d4af37;
            color: #fff;
        }
        .user-msg {
            background-color: #222;
            border-right: 4px solid #d4af37;
            margin-left: auto;
            text-align: right;
        }
        .user-input-area {
            padding: 20px;
            background-color: #1a1a1a;
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            background: #0d0d0d;
            border: 1px solid #d4af37;
            color: #d4af37;
            padding: 12px;
            border-radius: 5px;
            outline: none;
        }
        button {
            background-color: #d4af37;
            color: #0d0d0d;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    <h1>गुरु AI</h1>
    <p>परिवर्तनको यात्रा - अर्जुनको एउटा सपना</p>
</header>

<div id="chat-container">
    <div class="message guru-msg">
        नमस्ते! म <b>गुरु AI</b> हुँ। म तपाईँलाई नयाँ सीप सिक्न मद्दत गर्नेछु। आज के कुरा गरौँ?
    </div>
</div>

<div class="user-input-area">
    <input type="text" id="userInput" placeholder="यहाँ आफ्नो प्रश्न लेख्नुहोस्...">
    <button onclick="sendMessage()">सोध्नुहोस्</button>
</div>

<script src="script.js"></script>
</body>
</html>
